global:
  scrape_interval:     5s
  evaluation_interval: 5s

# Load alert rules
rule_files:
  - /etc/prometheus/alerts.yml

# Send alerts to Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'sre-app'
    static_configs:
      - targets: ['sre-app:8000']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
